<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="description" content="Budget Nutrition AU — optimal health for the lowest possible cost. Personalised nutrient tracking, 80+ recipes, meal planning and shopping lists for Australians." />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥦</text></svg>" />
    <title>Budget Nutrition AU</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0f172a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
  <script>
    // Nuke any stale service workers and caches for all users
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        var nuked = regs.length > 0;
        regs.forEach(function(r) { r.unregister(); });
        if ('caches' in window) {
          caches.keys().then(function(keys) {
            keys.forEach(function(k) { caches.delete(k); });
            if (nuked) location.reload();
          });
        } else if (nuked) {
          location.reload();
        }
      });
    }
  </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
